<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>物件購入判断ツール</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="app-header">
  <h1>物件購入判断・遵法性チェックツール</h1>
  <div class="global-settings">
    <label>
      自己資金割合(%)
      <input type="number" id="selfFundRatio" min="0" max="100" step="1" value="20">
    </label>
    <span class="hint">ローンシミュレーションの借入額 = 物件価格 ×(1 − 自己資金割合)</span>
    <a href="install.html" target="_blank" class="install-link">🔖 ブックマークレットを設定</a>
  </div>
</header>

<main>
  <section class="toolbar">
    <button id="btnNewProperty" class="btn-primary">＋ 物件を追加</button>
  </section>

  <section id="propertyList" class="property-list"></section>
</main>

<!-- 新規/編集フォーム -->
<div id="formOverlay" class="overlay hidden">
  <div class="modal">
    <h2 id="formTitle">物件を追加</h2>

    <div class="form-block">
      <label>物件情報を貼り付け(任意フォーマット可)</label>
      <textarea id="rawText" rows="8" placeholder="所在地：埼玉県春日部市南中曽根383-14&#10;価格：9,670万円&#10;土地面積：751m²&#10;建物面積：850m²&#10;建ぺい率／容積率：60%／200%&#10;都市計画：市街化区域&#10;現況：空室&#10;構造：重量鉄骨造&#10;築年月：1993年"></textarea>
      <button id="btnParse" class="btn-secondary">自動解析して下の項目に反映</button>
      <p class="hint">解析結果は必ず下の項目で確認・修正してください(フォーマットが多様なため誤検出の可能性があります)。</p>
    </div>

    <div class="form-grid">
      <label>物件名/住所<input type="text" id="f_address"></label>
      <label>物件種別(統計相場の判定に使用)
        <select id="f_buildingType">
          <option value="">不明・その他</option>
          <option value="house">一戸建</option>
          <option value="apartment">マンション・アパート(一棟含む)</option>
        </select>
      </label>
      <label>構造<input type="text" id="f_structure"></label>
      <label>築年月<input type="text" id="f_builtYear"></label>
      <label>価格(万円)<input type="number" id="f_price" step="1"></label>
      <label>諸費用(万円・任意/空欄なら価格の7%で概算)<input type="number" id="f_costs" step="1"></label>
      <label>土地面積(m²)<input type="number" id="f_landArea" step="0.01"></label>
      <label>建築面積(建蔽率算定用・m²/未記載なら空欄可)<input type="number" id="f_footprintArea" step="0.01"></label>
      <label>地上階数(建築面積が空欄のとき延床÷階数で推定)<input type="number" id="f_floors" step="1" min="1"></label>
      <label>延床面積(容積率算定用・m²)<input type="number" id="f_totalFloorArea" step="0.01"></label>
      <label>建蔽率(指定・%)<input type="number" id="f_coverageDesignated" step="0.1"></label>
      <label>容積率(指定・%)<input type="number" id="f_farDesignated" step="0.1"></label>
      <label>都市計画(記載のまま)<input type="text" id="f_cityPlanning"></label>
      <label>現況<input type="text" id="f_occupancy"></label>
      <label>想定家賃算出の基準面積(m²・空欄なら延床面積を使用)<input type="number" id="f_rentBasisArea" step="0.01"></label>
    </div>

    <div class="form-block">
      <label>近隣類似物件の家賃情報(複数件入力可)</label>
      <table class="comp-table" id="compTable">
        <thead><tr><th>住所/物件名</th><th>面積(m²)</th><th>家賃(万円/月)</th><th></th></tr></thead>
        <tbody id="compTableBody"></tbody>
      </table>
      <button id="btnAddComp" class="btn-secondary btn-small">＋ 類似物件を追加</button>
    </div>

    <div class="form-actions">
      <button id="btnCancel" class="btn-secondary">キャンセル</button>
      <button id="btnSave" class="btn-primary">保存</button>
    </div>
  </div>
</div>

<script src="rent-data.js"></script>
<script src="app.js" defer></script>
</body>
</html>
